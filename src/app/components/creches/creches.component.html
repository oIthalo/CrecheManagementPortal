<div class="h-full">
  <div class="max-w-6xl mx-auto flex flex-col gap-10 pb-10">
    <header class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-slate-800">Minhas Creches</h1>
        <p class="text-slate-500 mt-1">
          Gerencie as creches que você possui acesso
        </p>
      </div>

      <button
        (click)="openAddCrecheModal()"
        class="bg-linear-to-r from-indigo-600 to-blue-700 text-white px-6 py-3 rounded-xl font-semibold shadow-md hover:shadow-lg hover:scale-[1.03] transition cursor-pointer"
      >
        Nova Creche
      </button>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
      <div
        *ngFor="let creche of creches"
        class="group bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl transition-all duration-300 p-6 flex flex-col justify-between"
      >
        <div class="flex items-start gap-4">
          <div
            class="w-14 h-14 rounded-xl bg-indigo-100 flex items-center justify-center"
          >
            <lucide-icon
              [name]="schoolIcon"
              class="text-indigo-700"
            ></lucide-icon>
          </div>

          <div class="flex flex-col flex-1">
            <h2 class="text-lg font-semibold text-slate-800">
              {{ creche.name }}
            </h2>

            <p class="text-sm text-slate-500">
              {{ creche.email }}
            </p>
          </div>
        </div>

        <div class="flex flex-col gap-2 text-sm text-slate-600 mt-6">
          <div class="flex items-center gap-2">
            <lucide-icon [name]="phoneIcon" size="18"></lucide-icon>
            <span>{{ creche.contactNumber }}</span>
          </div>

          <div class="flex items-start gap-2">
            <lucide-icon [name]="mapPinIcon" size="18"></lucide-icon>
            <span>
              {{ creche.address.street }}, {{ creche.address.number }} <br />
              {{ creche.address.city }} - {{ creche.address.state }}
            </span>
          </div>
        </div>

        <div class="flex justify-end mt-6">
          <button
            (click)="navigateToCreche(creche)"
            class="px-4 py-2 rounded-lg text-indigo-700 font-semibold hover:bg-indigo-50 transition flex items-center gap-2 cursor-pointer"
          >
            Entrar
            <lucide-icon [name]="arrowRightIcon" size="18"></lucide-icon>
          </button>
        </div>
      </div>
    </section>
  </div>

  <app-create-creche
    *ngIf="showAddCrecheModal"
    (close)="closeAddCrecheModal()"
  ></app-create-creche>
</div>
