<div
  class="fixed inset-0 flex items-center justify-center z-50 backdrop-blur-sm bg-black/40"
>
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-lg p-8">
    <header class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-slate-800">Adicionar Creche</h2>
      <button
        (click)="closeModal()"
        class="text-gray-400 hover:text-gray-700 text-2xl font-bold cursor-pointer"
      >
        &times;
      </button>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <input
        formControlName="name"
        placeholder="Nome"
        class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <input
        formControlName="cnpj"
        placeholder="CNPJ"
        class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <input
        formControlName="email"
        placeholder="Email"
        class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <input
        formControlName="contactNumber"
        placeholder="Telefone"
        class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />

      <div formGroupName="address" class="grid grid-cols-2 gap-3">
        <input
          formControlName="zipCode"
          placeholder="CEP"
          class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <input
          formControlName="state"
          placeholder="Estado"
          class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <input
          formControlName="city"
          placeholder="Cidade"
          class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <input
          formControlName="district"
          placeholder="Bairro"
          class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <input
          formControlName="street"
          placeholder="Rua"
          class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <input
          formControlName="number"
          placeholder="Número"
          class="border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || isLoading"
        class="mt-4 bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Adicionar
      </button>
    </form>
  </div>
</div>
