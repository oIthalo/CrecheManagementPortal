<div
  class="relative min-h-screen w-full bg-white xl:bg-gray-100 xl:flex xl:items-center xl:justify-center overflow-hidden"
>
  <div
    class="hidden xl:block absolute inset-0 bg-[url('/assets/criancas3.png')] bg-cover bg-center blur-xl scale-110"
  ></div>

  <div class="hidden xl:block absolute inset-0 bg-black/40"></div>

  <div
    class="relative z-10 w-full xl:max-w-6xl xl:flex xl:rounded-3xl xl:shadow-2xl xl:overflow-hidden mx-auto"
  >
    <div class="xl:hidden w-full">
      <img
        src="assets/criancas.png"
        alt="Crianças"
        class="w-full h-64 object-cover"
      />
    </div>

    <div
      class="w-full bg-white xl:w-1/2 flex items-center justify-center p-6 px-10 xl:p-20"
    >
      <form #form="ngForm"(ngSubmit)="onSubmit()" class="w-full max-w-md space-y-6 mt-18 xl:mt-5">
        <h1
          class="text-3xl md:text-4xl font-bold bg-linear-to-r from-blue-700 to-indigo-800 bg-clip-text text-transparent text-center"
        >
          Bem-vindo de volta
        </h1>

        <div>
          <label class="block mb-2 text-sm font-medium text-slate-700">
            Email
          </label>
          <input
            type="email"
            name="email"
            [(ngModel)]="request.email"
            placeholder="email@example.com"
            class="w-full border border-indigo-300 rounded-xl py-3 px-4 shadow-sm focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none transition"
          />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium text-slate-700">
            Senha
          </label>
          <input
            type="password"
            name="password"
            [(ngModel)]="request.password"
            placeholder="••••••••••••••••"
            class="w-full border border-indigo-300 rounded-xl py-3 px-4 shadow-sm focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none transition"
          />
        </div>

        <div class="flex justify-between items-center xl:mb-4">
          <div class="flex items-center">
            <label
              class="relative flex cursor-pointer items-center rounded-full mr-1"
              for="ripple-on"
            >
              <input
                id="ripple-on"
                type="checkbox"
                name="keepalive"
                [(ngModel)]="request.keepalive"
                class="peer relative h-5 md:h-6 xl:h-4 w-5 md:w-6 xl:w-4 cursor-pointer appearance-none rounded border border-slate-400 shadow hover:shadow-md transition-all checked:border-slate-800 checked:bg-slate-800"
              />
              <span
                class="pointer-events-none absolute top-2/4 left-2/4 -translate-y-2/4 -translate-x-2/4 text-white opacity-0 transition-opacity peer-checked:opacity-100"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-3.5 w-3.5"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                    clip-rule="evenodd"
                  ></path>
                </svg>
              </span>
            </label>
            <label
              class="cursor-pointer text-slate-600 hover:text-slate-800 text-sm md:text-2xl xl:text-sm select-none"
              for="ripple-on"
            >
              Lembrar de mim
            </label>
          </div>
        </div>

        <button
          type="submit"
          class="w-full py-3 rounded-xl text-white font-semibold bg-linear-to-r from-blue-700 to-indigo-800 hover:from-blue-800 hover:to-indigo-900 shadow-lg hover:shadow-xl transition cursor-pointer"
        >
          Entrar
        </button>

        <p class="text-center text-sm text-slate-500">
          Ainda não possui uma conta?
          <b
            routerLink="/register"
            class="text-indigo-700 hover:underline cursor-pointer"
          >
            Cadastre-se.
          </b>
        </p>
      </form>
    </div>

    <div
      class="hidden xl:flex xl:w-1/2 flex-col items-center justify-center p-20 bg-linear-to-br from-blue-700 via-blue-800 to-indigo-900 text-white"
    >
      <div class="max-w-md text-center">
        <img src="assets/criancas2.png" class="w-full mb-10" />
        <h2 class="text-3xl font-bold mb-4">
          Organize sua creche com facilidade.
        </h2>
        <p class="text-slate-200">
          Acesse sua conta e continue gerenciando alunos, turmas e presença com
          segurança e praticidade.
        </p>
      </div>
    </div>
  </div>
</div>
