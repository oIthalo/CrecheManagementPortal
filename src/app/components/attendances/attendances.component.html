<div class="h-full">
  <div class="max-w-6xl mx-auto flex flex-col gap-10 pb-10">
    <header
      class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"
    >
      <div>
        <h1 class="text-3xl font-bold text-slate-800">Frequência</h1>
        <p class="text-slate-500 mt-1">Controle de presença por sala</p>
      </div>

      <input
        type="date"
        [(ngModel)]="selectedDate"
        [max]=""
        class="border border-slate-300 rounded-xl px-4 py-2 text-slate-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
    </header>

    <section class="flex flex-col gap-4">
      <div
        *ngFor="let classroom of classrooms"
        class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden"
      >
        <div
          (click)="toggleClassroom(classroom)"
          class="flex items-center justify-between p-6 cursor-pointer hover:bg-slate-50 transition"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-xl bg-indigo-100 flex items-center justify-center"
            >
              <lucide-icon
                [name]="schoolIcon"
                class="text-indigo-700"
              ></lucide-icon>
            </div>

            <div>
              <h2 class="text-lg font-semibold text-slate-800">
                {{ classroom.name }}
              </h2>

              <p class="text-sm text-slate-500">
                {{ attendances.length || 0 }} registros
              </p>
            </div>
          </div>

          <lucide-icon
            [name]="chevronDownIcon"
            class="text-slate-500 transition"
            [class.rotate-180]="classroom.open"
          ></lucide-icon>
        </div>

        <div *ngIf="classroom.open" class="border-t border-slate-200">
          <div
            *ngFor="let attendance of attendances"
            class="flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition"
          >
            <div class="flex flex-col">
              <span class="font-medium text-slate-800">
                {{ attendance.studentName }}
              </span>

              <span class="text-sm text-slate-500">
                Registrado por: {{ attendance.registeredBy }}
              </span>
            </div>

            <div class="flex items-center gap-6 text-sm text-slate-600">
              <span>
                {{ attendance.date | date: "dd/MM/yyyy" }}
              </span>

              <span
                class="px-3 py-1 rounded-lg text-xs font-semibold"
                [ngClass]="{
                  'bg-green-100 text-green-700':
                    attendance.status === 'Presente',
                  'bg-red-100 text-red-700': attendance.status === 'Falta',
                  'bg-yellow-100 text-yellow-700':
                    attendance.status === 'Justificado',
                }"
              >
                {{ attendance.status }}
              </span>
            </div>
          </div>

          <div
            *ngIf="!attendances || attendances.length === 0"
            class="text-center text-slate-400 py-6"
          >
            Nenhum registro para esta data
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
